<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ISL Connect — Verify Email</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1e1e24;--surface:#2b2b36;--card:#2b2b36;--border:rgba(255,255,255,0.1);
      --accent:#4a90e2;--accent2:#357abd;--text:#e0e0e0;--muted:#a0a0a0;--err:#f87171}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,200,150,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,150,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;
      padding:44px 40px;width:100%;max-width:420px;text-align:center;
      box-shadow:0 24px 64px rgba(0,0,0,.5);animation:up .5s ease;z-index:1}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.icon{font-size:48px;display:block;margin-bottom:16px}
h2{font-size:1.4rem;font-weight:700;margin-bottom:6px}
.sub{color:var(--muted);font-size:.85rem;line-height:1.6;margin-bottom:6px}
.email-pill{
  display:inline-block;background:rgba(0,200,150,.08);
  border:1px solid rgba(0,200,150,.2);border-radius:20px;
  padding:4px 14px;font-family:'JetBrains Mono',monospace;
  font-size:.82rem;color:var(--accent);margin:10px 0 24px
}

/* OTP boxes */
.otp-row{display:flex;justify-content:center;gap:10px;margin-bottom:24px}
.otp-box{
  width:50px;height:60px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s
}
.otp-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,150,.15)}
input[name="otp"]{display:none}

.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;color:#fff;
  font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:opacity .2s
}
.btn-primary:hover{opacity:.9}

.alert{border-radius:10px;padding:11px 14px;margin-bottom:20px;font-size:.82rem}
.alert-err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--err)}
.alert-ok{background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.25);color:var(--accent)}

.footer-links{margin-top:18px;font-size:.8rem;color:var(--muted);display:flex;justify-content:center;gap:16px}
.footer-links a{color:var(--accent);text-decoration:none;font-weight:600}

.timer{margin-top:12px;font-size:.78rem;color:var(--muted)}
#cd{font-weight:600;color:var(--warn,#fbbf24)}
</style>
</head>
<body>
<div class="card">
  <span class="icon">📬</span>
  <h2>Check your email</h2>
  <p class="sub">We sent a 6-digit verification code to</p>
  <div class="email-pill">{{ email }}</div>

  {% if error %}
  <div class="alert alert-err">⚠️ {{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="alert alert-ok">✅ {{ success }}</div>
  <a href="/login" style="display:block;margin-top:10px;color:var(--accent2);font-weight:600;font-size:.88rem">← Go to Sign In</a>
  {% else %}
  <form method="POST" id="otpForm">
    <div class="otp-row">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="d0">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="d1">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="d2">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="d3">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="d4">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="d5">
    </div>
    <input type="hidden" name="otp" id="otpHidden">
    <button type="submit" class="btn-primary" onclick="assembleOtp()">Verify Email ✓</button>
  </form>

  <div class="footer-links">
    <a href="/resend-otp/{{ email }}">Resend code</a>
    <a href="/signup">Start over</a>
  </div>
  <div class="timer">Code expires in <span id="cd">5:00</span></div>
  {% endif %}
</div>

<script>
// Auto-advance between boxes
const boxes = document.querySelectorAll('.otp-box');
boxes.forEach((b, i) => {
  b.addEventListener('input', () => {
    if (b.value && i < 5) boxes[i+1].focus();
    assembleOtp();
  });
  b.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !b.value && i > 0) boxes[i-1].focus();
  });
  b.addEventListener('paste', e => {
    const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
    if (txt.length === 6) {
      boxes.forEach((b2,i2) => b2.value = txt[i2] || '');
      assembleOtp(); boxes[5].focus();
    }
    e.preventDefault();
  });
});
boxes[0]?.focus();

function assembleOtp() {
  document.getElementById('otpHidden').value = [...boxes].map(b=>b.value).join('');
}

// Countdown
let t = 300;
const cd = document.getElementById('cd');
if (cd) {
  const iv = setInterval(() => {
    if (--t <= 0) { cd.textContent = 'Expired'; clearInterval(iv); return; }
    cd.textContent = Math.floor(t/60) + ':' + String(t%60).padStart(2,'0');
  }, 1000);
}
</script>
</body>
</html>
